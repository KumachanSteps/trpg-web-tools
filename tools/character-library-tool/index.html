<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>キャラリブラ v1.0</title>
  <link rel="stylesheet" href="./character-library.css">
</head>

<body>
  <div class="app">
    <header class="topbar"><a class="brand" href="./index.html"><b>◆</b><span><strong>キャラリブラ</strong><small>JSON Import
            Test</small></span></a>
      <div class="actions"><button class="btn" id="openImport">＋ キャラクター追加</button></div>
    </header>

    <section class="version-panel" id="versionPanel">
      <div>
        <strong>キャラリブラ v1.0</strong>
        <span>Current stable version / 次回更新は v1.1</span>
      </div>
      <button class="btn" type="button" id="versionCheckBtn">Version Check</button>
    </section>
    <section class="stats">
      <div><span>登録</span><b data-count="total">0</b></div>
      <div><span>CoC 6版</span><b data-count="coc6">0</b></div>
      <div><span>CoC 7版</span><b data-count="coc7">0</b></div>
      <div><span>エモクロア</span><b data-count="emoklore">0</b></div>
    </section>
    <main class="layout">
      <aside class="drawer">
        <div class="drawerHead">
          <h2>Filter / Search</h2><button id="toggleFilter">×</button>
        </div><input id="search" class="search" placeholder="名前・技能・タグで検索">
        <div class="filters"><label>Sort<select id="sort">
              <option value="registered">登録順</option>
              <option value="updated">更新順</option>
              <option value="nameKana">あいうえお順</option>
              <option value="san">SAN</option>
              <option value="paramTotal">能力値合計</option>
            </select></label>
          <div class="two"><label>System<select id="system">
                <option value="all">All</option>
                <option value="coc6">6版</option>
                <option value="coc7">7版</option>
                <option value="emoklore">エモクロア</option>
              </select></label><label>Status<select id="status">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="lost">Lost</option>
                <option value="retire">Retire</option>
              </select></label></div>
          <h3>Status</h3>
          <div id="statRows"></div>
          <h3>Skill</h3>
          <div id="skillRows"></div>
          <h3>Status</h3><label class="check"><input type="checkbox" id="db1d4">DB +1D4</label><label
            class="check"><input type="checkbox" id="db1d6">DB +1D6</label><label class="cond san">Current SAN <input
              id="sanAbove" type="number" value="0"> above</label>
        </div>
      </aside>
      <section class="gallery">
        <div class="galleryHead">
          <h2>キャラクター一覧</h2><span id="shown">0件</span>
        </div>
        <div id="grid" class="grid"></div>
      </section>
    </main>
  </div>
  <div id="modal" class="modal hidden">
    <div class="backdrop"></div>
    <div class="dialog">
      <div class="dialogHead">
        <div>
          <h2>キャラクターJSONを貼り付け</h2>
          <p>CCFOLIA / エモクロアのJSONを貼って読み込みます。</p>
        </div><button id="closeImport">×</button>
      </div><textarea id="jsonText" spellcheck="false"></textarea>
      <div class="modalActions"><button id="sample" class="btn ghost">サンプルJSON</button><button id="parse"
          class="btn">読み込み</button><button id="save" class="btn primary" disabled>登録</button></div>
      <div id="preview" class="preview hidden"></div>
      <div id="error" class="error hidden"></div>
    </div>
  </div>
  <script src="./data/characters.js"></script>
  <script src="./character-library.js"></script>
</body>

</html>

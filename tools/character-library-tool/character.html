<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キャラクター詳細 | キャラクターライブラリ</title>
  <link rel="stylesheet" href="./character-library.css" />
</head>
<body data-page="detail">
  <div class="app">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="キャラクターライブラリ ホーム">
        <div class="brand-mark">◆</div>
        <div>
          <h1>キャラクターライブラリ</h1>
          <p>Character Detail Page</p>
        </div>
      </a>

      <div class="top-actions">
        <a class="btn" href="./index.html">← 一覧へ戻る</a>
        <button class="btn" type="button">EN / JP</button>
        <button class="btn" type="button">編集</button>
        <button class="btn primary" type="button" id="publicModeBtn">公開用表示</button>
      </div>
    </header>

    <main class="character-layout" id="characterDetail">
      <aside class="left-column">
        <section class="panel tachie-panel">
          <div class="tachie-stage" id="tachieStage">
            <div class="mock-tachie" id="mockTachie"></div>
          </div>
          <div class="variant-tabs" id="variantTabs"></div>
        </section>

        <section class="panel profile-card">
          <div class="name-row">
            <div class="name-block">
              <h2 id="detailName">Loading...</h2>
              <div class="reading" id="detailReading"></div>
            </div>
            <div class="name-actions">
              <div class="edition-badge" id="detailEdition"></div>
              <div class="profile-link">
                <a class="btn primary" id="iacharaLink" href="#" target="_blank" rel="noopener">いあきゃらを開く</a>
              </div>
            </div>
          </div>

          <div class="occupation">
            <span>Occupation</span>
            <strong id="detailOccupation"></strong>
          </div>

          <div class="profile-mini-grid">
            <div class="profile-mini">
              <span>Age</span>
              <strong id="detailAge"></strong>
            </div>
            <div class="profile-mini">
              <span>Gender</span>
              <strong id="detailGender"></strong>
            </div>
            <div class="profile-mini">
              <span>Height</span>
              <strong id="detailHeight"></strong>
            </div>
          </div>

          <div class="theme-row">
            <div>
              <span>Theme Color</span>
              <strong id="detailThemeLabel"></strong>
            </div>
            <div class="color-chip" id="detailColorChip"></div>
          </div>

          <div class="summary-card" id="detailSummary"></div>
        </section>
      </aside>

      <section class="right-column">
        <section class="panel section-panel">
          <div class="section-header">
            <div>
              <h3>parameter</h3>
              <p id="parameterLabel">能力値・副能力値</p>
            </div>
            <div class="section-actions" id="detailBadges"></div>
          </div>
          <div class="parameter-grid" id="parameterGrid"></div>
        </section>

        <section class="panel section-panel">
          <div class="section-header">
            <div>
              <h3>skills</h3>
              <p>主要技能・検索対象技能</p>
            </div>
            <div class="section-actions">
              <span class="small-pill active">すべて</span>
              <span class="small-pill">70+</span>
              <span class="small-pill">知識</span>
              <span class="small-pill">探索</span>
            </div>
          </div>

          <div class="skills-area">
            <div class="skill-filter">
              <button class="small-pill active" type="button">すべて</button>
              <button class="small-pill" type="button">探索</button>
              <button class="small-pill" type="button">行動</button>
              <button class="small-pill" type="button">交渉</button>
              <button class="small-pill" type="button">知識</button>
              <button class="small-pill" type="button">戦闘</button>
            </div>

            <div class="skills-table" id="skillsTable"></div>
          </div>
        </section>

        <section class="panel section-panel">
          <div class="section-header">
            <div>
              <h3>weapons / items</h3>
              <p>武器・所持品・シナリオ用アイテム</p>
            </div>
            <div class="section-actions">
              <span class="small-pill active">all</span>
              <span class="small-pill">weapon</span>
              <span class="small-pill">item</span>
            </div>
          </div>

          <div class="item-list" id="itemList"></div>
        </section>

        <section class="panel section-panel">
          <div class="section-header">
            <div>
              <h3>character memo</h3>
              <p>タブ切替・秘匿タブ非表示対応</p>
            </div>
            <div class="section-actions">
              <span class="small-pill" id="publicModeStatus">通常表示</span>
              <button class="small-pill active" type="button" id="hideSecretBtn">秘匿を隠す</button>
            </div>
          </div>

          <div class="memo-tabs" id="memoTabs"></div>
          <div class="memo-body">
            <div class="memo-card" id="memoBody"></div>
          </div>
        </section>
      </section>
    </main>

    <div class="footer-note">
      Character Library / Detail Page
    </div>
  </div>

  <script src="./data/characters.js"></script>
  <script src="./character-library.js"></script>
</body>
</html>

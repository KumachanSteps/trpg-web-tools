<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卓準備カレンダー v0.11 | TRPG WEBツール観測所</title>
  <link rel="icon" href="../../assets/img/kuma_icon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/session_check_calendar.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="brand-block" href="../../" aria-label="TRPG WEBツール観測所へ戻る">
        <span class="brand-kicker">TRPG WEBツール観測所</span>
        <strong>卓準備カレンダー</strong>
        <span>TRPGセッション予定と準備タスクをまとめて管理</span>
      </a>
      <div class="header-side">
        <nav class="header-actions" aria-label="ツール操作">
          <button id="reportBridgeBtn" type="button">報告</button>
          <button id="languageBtn" type="button">JP/EN</button>
          <button id="helpBtn" type="button">使い方</button>
          <button id="shortcutBtn" type="button">ショートカット</button>
          <button id="themeBtn" type="button">Light/Night</button>
        </nav>
        <span class="version">v0.11 / 2026.06.19</span>
      </div>
    </header>

    <main class="layout">
      <section class="calendar-area">
        <div class="toolbar">
          <button id="addSessionBtn" class="primary" type="button">＋ セッション追加</button>
          <button id="addTaskBtn" class="ghost" type="button">☑ タスク追加</button>
          <label class="ghost file-label">☁ JSON読込<input id="importInput" type="file" accept="application/json,.json" hidden /></label>
          <label class="ghost file-label">▣ iCal読込<input id="icalInput" type="file" accept="text/calendar,.ics,.ical" hidden /></label>
          <button id="googleImportBtn" class="ghost" type="button">Googleカレンダー読込</button>
          <button id="exportJsonBtn" class="ghost" type="button">⇩ JSON出力</button>
          <button id="exportIcalBtn" class="ghost" type="button">▣ iCal出力</button>
          <span class="toolbar-spacer"></span>
          <button id="todayBtn" class="ghost" type="button">今日</button>
          <button id="prevMonthBtn" class="ghost" type="button">‹ 前月</button>
          <button id="nextMonthBtn" class="ghost" type="button">次月 ›</button>
        </div>

        <section id="focusPanel" class="focus-panel" hidden>
          <div>
            <span class="eyebrow">FOCUS DATE</span>
            <strong id="focusDateLabel">----</strong>
            <small>選択した日付にイベントや準備タスクを追加できます。</small>
          </div>
          <div class="focus-actions">
            <button id="focusAddSessionBtn" class="primary" type="button">この日にセッション追加</button>
            <button id="focusAddTaskBtn" class="ghost" type="button">この日にタスク追加</button>
            <button id="clearFocusBtn" class="ghost" type="button">解除</button>
          </div>
        </section>

        <section class="month-card" aria-label="月間カレンダー">
          <h2 id="monthTitle">----</h2>
          <div class="weekdays"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>
      </section>

      <aside class="side-column">
        <section class="panel today-panel">
          <h2>▣ 今日の予定</h2>
          <div id="todayList" class="stack-list"></div>
        </section>
        <section class="panel task-panel">
          <h2>☑ 今週の準備タスク <span id="weekRange"></span></h2>
          <p class="panel-note">ドラッグで並び替え。左の大きなチェックで完了にできます。</p>
          <div id="taskList" class="task-list" aria-label="今週の準備タスク"></div>
          <button id="showAllTasksBtn" class="wide-button" type="button">☰ すべてのタスクを表示</button>
        </section>
      </aside>

      <aside id="detailPane" class="detail-pane" aria-live="polite">
        <div class="detail-head">
          <h2>▣ セッション詳細</h2>
          <button id="closeDetailBtn" type="button" aria-label="詳細を閉じる">×</button>
        </div>
        <div id="detailContent" class="detail-content empty">カレンダーからセッションを選択してください。</div>
      </aside>
    </main>
  </div>

  <dialog id="sessionDialog" class="modal">
    <form id="sessionForm" method="dialog">
      <div class="modal-head"><h2 id="dialogTitle">セッション追加</h2><button value="cancel" type="submit">×</button></div>
      <div class="form-grid">
        <label>シナリオ名<input id="scenarioInput" required /></label>
        <label>システム<input id="systemInput" placeholder="クトゥルフ神話TRPG" /></label>
        <label>日時<input id="dateInput" type="datetime-local" required /></label>
        <label>終了時刻<input id="endTimeInput" type="time" /></label>
        <label>GM / KP<input id="gmInput" /></label>
        <label>形式<input id="formatInput" placeholder="オンライン（ココフォリア＋Discord）" /></label>
        <label>ステータス<select id="statusInput"><option value="scheduled">予定確定</option><option value="tentative">調整中</option><option value="completed">完了</option></select></label>
        <label>タグ<input id="hashtagsInput" placeholder="TRPG, クトゥルフ神話TRPG" /></label>
        <label class="full">参加者（1行につき PL / PC）<textarea id="playersInput" placeholder="Aさん / 探索者A&#10;Bさん / 探索者B"></textarea></label>
        <label class="full">関連リンク（1行につき ラベル | URL）<textarea id="linksInput" placeholder="ココフォリア | https://..."></textarea></label>
        <label class="full">準備タスク（1行につき タスク名 | 期限YYYY-MM-DD | ステータス）<textarea id="tasksInput" placeholder="NPC立ち絵準備 | 2026-07-02 | 今日"></textarea></label>
        <label class="full">メモ<textarea id="memoInput"></textarea></label>
      </div>
      <div class="modal-actions"><button class="danger" id="deleteSessionBtn" type="button">削除</button><span></span><button value="cancel" type="submit">キャンセル</button><button id="saveSessionBtn" class="primary" value="default" type="submit">保存</button></div>
    </form>
  </dialog>

  <dialog id="taskDialog" class="modal task-modal">
    <form id="taskForm" method="dialog">
      <div class="modal-head"><h2>準備タスク追加</h2><button value="cancel" type="submit">×</button></div>
      <div class="form-grid">
        <label class="full">タスク名<input id="taskTitleInput" required placeholder="NPC立ち絵準備" /></label>
        <label>紐付ける卓<select id="taskSessionSelect" required></select></label>
        <label>期限<input id="taskDueInput" type="date" /></label>
        <label>ステータス<select id="taskStatusInput"><option value="未着手">未着手</option><option value="今日">今日</option><option value="3日以内">3日以内</option><option value="期限切れ">期限切れ</option><option value="完了">完了</option></select></label>
        <label>完了<select id="taskDoneInput"><option value="false">未完了</option><option value="true">完了</option></select></label>
      </div>
      <div class="modal-actions"><span></span><span></span><button value="cancel" type="submit">キャンセル</button><button class="primary" value="default" type="submit">追加</button></div>
    </form>
  </dialog>

  <dialog id="importDialog" class="modal import-modal">
    <form method="dialog">
      <div class="modal-head"><h2 id="importDialogTitle">読み込むカレンダーを選択</h2><button value="cancel" type="submit">×</button></div>
      <div class="import-body">
        <p id="importDialogLead">取り込むカレンダーだけを選択してください。</p>
        <div id="importSourceList" class="source-list"></div>
      </div>
      <div class="modal-actions"><span></span><span></span><button value="cancel" type="submit">キャンセル</button><button id="confirmImportBtn" class="primary" value="default" type="submit">選択分を読み込む</button></div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="js/session_check_calendar.js"></script>
</body>
</html>

<!DOCTYPE html><html lang="ja" data-theme="dark"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Developer Reports | TRPG WEBツール観測所</title><link rel="stylesheet" href="../../shared/reporting/reporting.css"/></head><body><main class="page-shell"><header class="report-header"><div><p class="brand">TRPG WEBツール観測所</p><h1>Developer Reports</h1><p class="header-description">報告フォームから送信された内容を確認する開発者専用ページです。Firebase Authentication と Firestore Security Rules で管理者のみ閲覧できます。</p></div><nav class="header-actions"><a class="btn" href="../../">Portal</a><a class="btn" href="../../report/">Report</a><button class="btn" type="button" id="themeToggle">Light</button></nav><div class="version-engrave">v0.1 / 2026.07.19</div></header><section class="card" id="loginPanel"><h2>Developer Login</h2><p class="muted">管理者として許可されたGoogleアカウントでログインしてください。</p><button class="btn btn-primary" type="button" id="loginButton">Googleでログイン</button></section><section id="adminPanel" hidden><div class="admin-toolbar"><span class="btn" id="adminUser"></span><button class="btn" type="button" id="reloadButton">再読み込み</button><button class="btn btn-danger" type="button" id="logoutButton">ログアウト</button></div><div class="layout"><section class="card"><h2>報告一覧</h2><div class="admin-filters"><input id="filterText" type="text" placeholder="ツール名・内容で検索"/><select id="filterStatus"><option value="">すべての状況</option><option value="new">未確認</option><option value="checking">確認中</option><option value="planned">修正予定</option><option value="fixed">修正済み</option><option value="as-designed">仕様</option><option value="on-hold">保留</option><option value="wont-fix">対応しない</option></select></div><div id="reportList" class="report-list"></div></section><aside class="side-stack"><section class="side-card"><h3>対応状況</h3><select id="statusSelect"><option value="new">未確認</option><option value="checking">確認中</option><option value="planned">修正予定</option><option value="fixed">修正済み</option><option value="as-designed">仕様</option><option value="on-hold">保留</option><option value="wont-fix">対応しない</option></select><label class="title" for="handledVersion" style="margin-top:16px;">対応バージョン</label><input id="handledVersion" type="text" placeholder="例: v1.39"/><label class="title" for="developerMemo" style="margin-top:16px;">開発者メモ</label><textarea id="developerMemo" placeholder="調査メモ、対応方針など"></textarea><button class="btn btn-primary" type="button" id="saveButton">保存</button></section><section class="side-card"><h3>報告詳細</h3><div id="reportDetail" class="muted small">左の一覧から報告を選択してください。</div></section></aside></div></section><div class="status-line" id="adminStatus">ログイン状態を確認中です。</div></main><script type="module" src="./admin-reports.js"></script></body></html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NJD5JZML31"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-NJD5JZML31");
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TRPG WEBツール観測所</title>
  <meta
    name="description"
    content="TRPGセッション準備・ログ解析・卓報告作成・シナリオ情報整理を補助するためのWebツール観測所です。"
  />

  <link rel="icon" href="./assets/img/kuma_icon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="./assets/css/portal.css?v=20260513-04" />
</head>

<body class="theme-dawn">
  <div class="background-space" aria-hidden="true">
    <div class="stars"></div>
    <div id="twinkleStars" class="twinkle-stars"></div>
    <div class="nebula nebula-a"></div>
    <div class="nebula nebula-b"></div>
    <div class="nebula nebula-c"></div>
    <div class="orbit-line"></div>
  </div>

  <main class="page">
    <header class="topbar">
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true">✦</div>

        <div>
          <p class="eyebrow" data-i18n="header.eyebrow">TRPG セッション支援ツール</p>
          <p class="topbar-subtitle" data-i18n="header.subtitle">星明かりのポータル / ツール観測所</p>
        </div>
      </div>

      <div class="topbar-actions">
        <div id="languageButtons" class="language-buttons" aria-label="Language selection">
          <button class="language-button is-active" type="button" data-lang="ja" aria-pressed="true">JP</button>
          <button class="language-button" type="button" data-lang="en" aria-pressed="false">EN</button>
        </div>

        <button id="modeToggle" class="mode-button" type="button" aria-label="Deep Spaceモードに切り替え">
          <span id="modeIcon" aria-hidden="true">☾</span>
          <span id="modeText">Deep Space</span>
        </button>
      </div>
    </header>

    <section class="hero-grid">
      <div class="hero-copy">
        <div class="hero-label">
          <span aria-hidden="true">✧</span>
          <span data-i18n="hero.label">自作TRPG Webツール集</span>
        </div>

        <h1 data-i18n="hero.title">TRPG WEBツール観測所</h1>

        <p class="lead" data-i18n="hero.lead">
          TRPG準備・ログ解析・卓報告・シナリオ整理を支援するポータルです。星図のように並ぶツールから、目的に合うものを選択してください。
        </p>
      </div>

      <aside class="status-summary" aria-label="Tool status summary">
        <div class="summary-grid">
          <div class="summary-item">
            <p id="availableCount" class="summary-number">0</p>
            <p class="summary-label" data-i18n="status.available">使用可能</p>
          </div>

          <div class="summary-item">
            <p id="productionCount" class="summary-number">0</p>
            <p class="summary-label" data-i18n="status.production">開発中</p>
          </div>

          <div class="summary-item">
            <p id="ideaCount" class="summary-number">0</p>
            <p class="summary-label" data-i18n="status.idea">アイデア</p>
          </div>
        </div>
      </aside>
    </section>

    <section class="filter-panel" aria-label="Tool filters">
      <div class="filter-row">
        <div class="search-box">
          <span class="search-mark" aria-hidden="true">⌕</span>
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="ツールを検索..."
            data-i18n-placeholder="search.placeholder"
            aria-label="Search tools"
            autocomplete="off"
          />
        </div>

        <div id="categoryButtons" class="category-buttons" aria-label="Tool categories">
          <button class="category-button is-active" type="button" data-category="all" data-i18n="categories.all" aria-pressed="true">すべて</button>
          <button class="category-button" type="button" data-category="logAnalysis" data-i18n="categories.logAnalysis" aria-pressed="false">ログ解析</button>
          <button class="category-button" type="button" data-category="reportWriting" data-i18n="categories.reportWriting" aria-pressed="false">卓報告</button>
          <button class="category-button" type="button" data-category="scenarioPrep" data-i18n="categories.scenarioPrep" aria-pressed="false">シナリオ準備</button>
          <button class="category-button" type="button" data-category="characterUtility" data-i18n="categories.characterUtility" aria-pressed="false">キャラクター支援</button>
          <button class="category-button" type="button" data-category="haishinTracking" data-i18n="categories.haishinTracking" aria-pressed="false">配信観測</button>
          <button class="category-button" type="button" data-category="gmSupport" data-i18n="categories.gmSupport" aria-pressed="false">GM支援</button>
        </div>
      </div>
    </section>

    <section id="toolsGrid" class="tools-grid" aria-label="Tool list"></section>

    <footer>
      <p data-i18n="footer.copy">© TRPG WEBツール観測所 / Created for TRPG Session Support</p>
    </footer>
  </main>

  <script src="./assets/js/i18n.js?v=20260513-04"></script>
  <script src="./assets/js/language.js?v=20260513-04"></script>
  <script src="./assets/js/portal.js?v=20260513-04"></script>
</body>
</html>
